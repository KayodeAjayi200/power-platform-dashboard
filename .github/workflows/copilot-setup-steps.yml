name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: windows-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install Power Platform CLI (pac)
        shell: pwsh
        run: |
          dotnet tool install -g Microsoft.PowerApps.CLI.Tool 2>$null
          if ($LASTEXITCODE -ne 0) { dotnet tool update -g Microsoft.PowerApps.CLI.Tool }
          # pac does not support --version; show first line of help output instead
          pac help 2>&1 | Select-Object -First 1

      - name: Install Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dataverse and Canvas MCP tools
        shell: pwsh
        run: |
          dotnet tool install -g Microsoft.PowerPlatform.Dataverse.MCP 2>$null
          if ($LASTEXITCODE -ne 0) { dotnet tool update -g Microsoft.PowerPlatform.Dataverse.MCP }
          dotnet tool install -g Microsoft.PowerPlatform.Canvas.MCP 2>$null
          if ($LASTEXITCODE -ne 0) { dotnet tool update -g Microsoft.PowerPlatform.Canvas.MCP }

      - name: Install npm MCP servers
        shell: pwsh
        run: |
          npm install -g @microsoft/copilot-studio-mcp
          npm install -g @modelcontextprotocol/server-github
          npm install -g @tiberriver256/mcp-server-azure-devops
          npm install -g @modelcontextprotocol/server-filesystem
          npm install -g @kazuph/mcp-fetch
          npm install -g @playwright/mcp

      - name: Install PnP CLI (m365)
        shell: pwsh
        run: npm install -g @pnp/cli-microsoft365

      - name: Install GitHub CLI Copilot extension
        shell: pwsh
        run: gh extension install github/gh-copilot
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Verify tools
        shell: pwsh
        continue-on-error: true   # version checks are informational — don't fail the whole job
        run: |
          Write-Host "=== Tool versions ==="
          # pac uses 'pac help' to show version — '--version' flag does not exist
          Write-Host "pac:    $(pac help 2>&1 | Select-Object -First 1)"
          Write-Host "node:   $(node --version)"
          Write-Host "dotnet: $(dotnet --version)"
          Write-Host "gh:     $(gh --version 2>&1 | Select-Object -First 1)"
          Write-Host "m365:   $(m365 version 2>&1 | Select-Object -First 1)"
          Write-Host "=== Skills available ==="
          Get-ChildItem skills/ | Select-Object -ExpandProperty Name
